services:
  api:
    image: randomguydk/aarhusspaceprogram:latest
    build: .
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - ConnectionStrings__SqlServer=Data Source=db;Initial Catalog=AarhusSpaceProgram;User ID=sa;Password=QJN63mdy;Trust Server Certificate=True;  
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=QJN63mdy
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "QJN63mdy", "-Q", "SELECT 1", "-No"]
      interval: 10s
      retries: 10
      start_period: 20s
      timeout: 5s